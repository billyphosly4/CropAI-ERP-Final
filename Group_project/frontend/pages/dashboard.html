<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | CropAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="dashboard">

    <div id="sidebar-placeholder"></div>

    <main class="main-content">
        <header class="top-bar">
            <div class="menu-toggle" id="toggleBtn"><i class="fas fa-bars"></i></div>
            <div class="top-bar-actions">
                <span class="auth-only" id="authStatus" style="display:none;"><i class="fas fa-check-circle"></i> Connected</span>
            </div>
        </header>

        <div class="content">
            <div class="welcome-section">
                <h1 id="welcome-title">Welcome back, <span id="welcome-name" style="color: #2ecc71;">Farmer</span>! 👋</h1>
                <p>Monitor real-time conditions and scan crops for diseases.</p>
            </div>

            <div class="sensor-grid">
                <div class="sensor-card">
                    <h3><i class="fas fa-temperature-high"></i> Temperature</h3>
                    <div class="sensor-value" id="temperatureValue">--°C</div>
                </div>
                <div class="sensor-card">
                    <h3><i class="fas fa-tint"></i> Soil Moisture</h3>
                    <div class="sensor-value" id="moistureValue">--%</div>
                </div>
                <div class="sensor-card">
                    <h3><i class="fas fa-cloud"></i> Humidity</h3>
                    <div class="sensor-value" id="humidityValue">--%</div>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; margin-top: 2rem;">
                <div class="detection-section">
                    <h2><i class="fas fa-camera"></i> AI Scanner</h2>
                    <div class="upload-area" id="uploadArea" onclick="document.getElementById('imageInput').click()">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p>Upload Leaf Image</p>
                    </div>
                    <input type="file" id="imageInput" accept="image/*" style="display: none;">
                    
                    <div class="preview-container" id="previewContainer" style="display: none; text-align: center;">
                        <img id="imagePreview" src="" style="max-width: 100%; border-radius: 15px; margin-bottom: 15px;">
                        <div style="display: flex; gap: 10px;">
                            <button class="btn-primary" style="flex: 2;" onclick="analyzeImage()">Analyze Now</button>
                            <button class="btn-primary" style="flex: 1; background: #e74c3c;" onclick="resetUpload()">Cancel</button>
                        </div>
                    </div>
                </div>
                <div class="alerts-list" id="alertsList">
                    </div>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="analysisModal" style="display: none;">
        <div class="modal-content">
            <div id="loading-spinner" style="text-align: center; padding: 40px;">
                <i class="fas fa-circle-notch fa-spin" style="font-size: 3rem; color: #2ecc71;"></i>
                <p style="margin-top: 20px; font-weight: 500; color: white;">Local Edge AI is analyzing your crop...</p>
            </div>

            <div id="analysisResult" style="display: none;">
                <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                    <h2 id="diseaseName" style="margin: 0; color: #2ecc71;">--</h2>
                    <span id="severityBadge" class="severity">--</span>
                </div>
                <p id="symptoms" style="margin: 15px 0; opacity: 0.8; color: white;"></p>
                <div class="treatment-box" style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; color: white;">
                    <h4 style="margin-top: 0;"><i class="fas fa-medkit"></i> Recommended Actions:</h4>
                    <div id="treatment"></div>
                </div>
                <button class="btn-primary" style="width: 100%; margin-top: 20px;" onclick="closeModal()">Close Result</button>
            </div>
        </div>
    </div>

    <script src="../js/navigation.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/dashboard.js"></script>
</body>
</html>
